<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocuMind — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #1a1a1a;
      padding: 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      border: 1px solid #2a2a2a;
    }
    h1 { font-size: 24px; margin-bottom: 6px; }
    p { color: #888; font-size: 14px; margin-bottom: 28px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab {
      flex: 1; padding: 8px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #888;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .tab.active { background: #fff; color: #000; border-color: #fff; }
    input {
      width: 100%;
      padding: 12px;
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      margin-bottom: 12px;
    }
    input:focus { outline: none; border-color: #555; }
    button.submit {
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    button.submit:hover { background: #e0e0e0; }
    .error {
      color: #ff4444;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }
    .success {
      color: #44ff88;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>DocuMind</h1>
    <p>AI-powered document intelligence</p>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <input type="email" id="email" placeholder="Email address" />
    <input type="password" id="password" placeholder="Password" />
    <button class="submit" onclick="handleSubmit()">Continue</button>

    <div class="error" id="error"></div>
    <div class="success" id="success"></div>
  </div>

  <script>
    const API = "https://web-production-d2b44.up.railway.app"
    let mode = "login"

    function switchTab(tab) {
      mode = tab
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      event.target.classList.add('active')
      document.getElementById('error').style.display = 'none'
      document.getElementById('success').style.display = 'none'
    }

    async function handleSubmit() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const errorEl = document.getElementById('error')
      const successEl = document.getElementById('success')

      errorEl.style.display = 'none'
      successEl.style.display = 'none'

      if (!email || !password) {
        errorEl.textContent = 'Please fill in all fields'
        errorEl.style.display = 'block'
        return
      }

      try {
        if (mode === 'signup') {
          const res = await fetch(`${API}/auth/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          })
          const data = await res.json()
          if (!res.ok) throw new Error(data.detail)
          successEl.textContent = 'Account created! Please login.'
          successEl.style.display = 'block'
          switchTab('login')
        } else {
          const res = await fetch(`${API}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          })
          const data = await res.json()
          if (!res.ok) throw new Error(data.detail)
          localStorage.setItem('token', data.access_token)
          window.location.href = 'dashboard.html'
        }
      } catch (err) {
        errorEl.textContent = err.message || 'Something went wrong'
        errorEl.style.display = 'block'
      }
    }
  </script>
</body>
</html>
